<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>泰语单词集管理 - Thai Word Set Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=Inter:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --thai-font: 'Sarabun', sans-serif;
            --main-font: 'Inter', sans-serif;
            --accent: #4f46e5;
            --sidebar-bg: #0f172a;
        }

        body {
            font-family: var(--main-font);
            background: #f8fafc;
            color: #1e293b;
            overflow: hidden;
        }

        .thai-text {
            font-family: var(--thai-font);
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(0, 0, 0, 0.1);
            border-radius: 2px;
        }

        .hidden {
            display: none !important;
        }

        #login-screen {
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
        }
    </style>
</head>

<body class="h-screen flex flex-col">

    <!-- Login Screen -->
    <div id="login-screen" class="fixed inset-0 z-[100] flex items-center justify-center">
        <div
            class="glass-panel p-10 rounded-3xl text-center max-w-sm w-full mx-4 border-white/10 bg-white/5 backdrop-blur-3xl shadow-2xl">
            <div class="mb-8">
                <div
                    class="w-16 h-16 bg-indigo-600 rounded-2xl mx-auto flex items-center justify-center shadow-lg shadow-indigo-500/30 mb-4">
                    <span class="text-3xl font-bold text-white">泰</span>
                </div>
                <h1 class="text-2xl font-bold text-white">单词集管理后台</h1>
                <p class="text-slate-400 mt-2">请使用管理员账号登录</p>
            </div>
            <button id="btn-login"
                class="w-full py-3.5 px-4 bg-white text-slate-900 rounded-xl font-bold shadow-xl hover:bg-slate-50 transform active:scale-95 transition-all flex items-center justify-center gap-3">
                <svg class="w-5 h-5" viewBox="0 0 24 24">
                    <path
                        d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                        fill="#4285F4" />
                    <path
                        d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                        fill="#34A853" />
                    <path
                        d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"
                        fill="#FBBC05" />
                    <path
                        d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                        fill="#EA4335" />
                </svg>
                Sign in with Google
            </button>
            <p id="login-error" class="text-rose-400 text-sm mt-4 hidden"></p>
        </div>
    </div>

    <!-- Main App Container -->
    <div id="app-container" class="flex flex-col h-full hidden">
        <!-- Top Navigation Bar -->
        <header class="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-6 shrink-0 z-10">
            <div class="flex items-center gap-3">
                <div
                    class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center font-bold text-white text-sm">
                    泰</div>
                <h1 class="text-lg font-bold text-slate-800 tracking-tight">Thai Learning <span
                        class="text-indigo-600">Sets Manager</span></h1>
            </div>

            <div class="flex items-center gap-4">
                <div class="flex items-center gap-2 bg-slate-100 rounded-lg px-3 py-1.5 border border-slate-200">
                    <span class="text-[10px] font-black text-slate-400 uppercase">API Base</span>
                    <input type="text" id="api-base" value="http://localhost:3000"
                        class="bg-transparent border-none text-xs font-bold text-slate-700 w-32 focus:ring-0"
                        placeholder="API Port">
                </div>
                <button onclick="app.showCreateModal()"
                    class="bg-indigo-600 text-white px-4 py-2 rounded-xl font-bold text-sm shadow-lg shadow-indigo-100 hover:bg-indigo-700 transition-all">
                    +新建单词集
                </button>
                <div class="w-px h-6 bg-slate-200 mx-2"></div>
                <img id="user-avatar" class="w-9 h-9 rounded-full ring-2 ring-indigo-50" src="" alt="">
                <button id="btn-logout" class="p-2 text-slate-400 hover:text-rose-500 transition-all">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1">
                        </path>
                    </svg>
                </button>
            </div>
        </header>

        <div class="flex flex-1 overflow-hidden">
            <!-- Sidebar -->
            <aside class="w-72 bg-slate-900 flex flex-col shrink-0">
                <div class="p-4 border-b border-slate-800">
                    <h3 class="text-slate-500 text-[10px] font-black uppercase tracking-widest mb-4">学习分组方案</h3>
                    <div id="set-list" class="space-y-1 overflow-y-auto custom-scrollbar h-[calc(100vh-180px)]">
                        <!-- Sets will be loaded here -->
                        <div class="p-4 text-center text-slate-600 animate-pulse text-sm">加载中...</div>
                    </div>
                </div>
            </aside>

            <!-- Main Content Area -->
            <main id="main-content" class="flex-1 overflow-y-auto bg-slate-50 p-8 custom-scrollbar relative">
                <!-- Welcome View -->
                <div id="welcome-view" class="flex flex-col items-center justify-center h-full text-center">
                    <div class="w-20 h-20 bg-white shadow-xl rounded-3xl flex items-center justify-center mb-6">
                        <svg class="w-10 h-10 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                                d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10">
                            </path>
                        </svg>
                    </div>
                    <h2 class="text-2xl font-bold text-slate-800 mb-2">管理泰语单词课件</h2>
                    <p class="text-slate-500 max-w-sm">从左侧选择一个单词集或者点击右上角创建一个新的分组。</p>
                </div>

                <!-- Set Detail View -->
                <div id="set-detail" class="hidden max-w-6xl mx-auto pb-20">
                    <div class="flex justify-between items-start mb-10">
                        <div>
                            <div class="flex items-center gap-3 mb-2">
                                <h1 id="detail-name" class="text-4xl font-black text-slate-900 tracking-tight">Set Name
                                </h1>
                                <button onclick="app.editCurrentSet()"
                                    class="p-2 text-slate-400 hover:text-indigo-600 transition-all">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                            d="M11 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z">
                                        </path>
                                    </svg>
                                </button>
                            </div>
                            <div id="detail-tags" class="flex gap-2"></div>
                        </div>
                        <div class="flex-1 max-w-sm mx-8">
                            <div class="relative group">
                                <input type="text" id="quick-add-input"
                                    class="w-full pl-5 pr-12 py-3.5 bg-white border border-slate-200 rounded-2xl focus:ring-4 focus:ring-indigo-100 outline-none font-bold text-slate-800 transition-all thai-text"
                                    placeholder="快速添加单词 (Enter)"
                                    onkeydown="if(event.key === 'Enter') app.quickAddWord()">
                                <button onclick="app.quickAddWord()"
                                    class="absolute right-2 top-2 bottom-2 px-3 bg-indigo-600 text-white rounded-xl hover:bg-indigo-700 transition-all">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                                            d="M12 4v16m8-8H4"></path>
                                    </svg>
                                </button>
                            </div>
                        </div>
                        <div class="text-right">
                            <p id="detail-count" class="text-2xl font-black text-indigo-600 leading-none">0</p>
                            <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mt-1 mb-4">Total
                                Words</p>
                            <button onclick="app.viewInApp()"
                                class="inline-flex items-center gap-2 px-4 py-2 bg-slate-900 text-white rounded-xl text-xs font-bold hover:bg-slate-800 transition-all shadow-lg shadow-slate-200">
                                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14">
                                    </path>
                                </svg>
                                在学习 App 中查看
                            </button>
                        </div>
                    </div>

                    <div id="word-cards" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        <!-- Word cards will load here -->
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Create/Edit Modal -->
    <div id="set-modal"
        class="fixed inset-0 z-[110] bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 hidden">
        <div class="bg-white rounded-[32px] w-full max-w-xl shadow-2xl overflow-hidden shadow-indigo-200">
            <div class="p-8 border-b border-slate-100 flex justify-between items-center">
                <h3 id="modal-title" class="text-xl font-black text-slate-800">新建单词集</h3>
                <button onclick="app.hideModal()" class="text-slate-400 hover:text-slate-600 transition-all"><svg
                        class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12">
                        </path>
                    </svg></button>
            </div>
            <div class="p-8 space-y-6">
                <div>
                    <label class="block text-xs font-black text-slate-400 uppercase tracking-widest mb-2">分组名称 Set
                        Name</label>
                    <input type="text" id="input-name"
                        class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-indigo-100 outline-none font-bold text-slate-800 transition-all"
                        placeholder="如：日常饮食 A1">
                </div>
                <div>
                    <label class="block text-xs font-black text-slate-400 uppercase tracking-widest mb-2">标签 Tags
                        (逗号分隔)</label>
                    <input type="text" id="input-tags"
                        class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-indigo-100 outline-none font-bold text-slate-800 transition-all"
                        placeholder="如：A1, 生活, 高频">
                </div>
                <div>
                    <label class="block text-xs font-black text-slate-400 uppercase tracking-widest mb-2">单词列表 Words
                        (每行一个泰语单词)</label>
                    <textarea id="input-words" rows="6"
                        class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-indigo-100 outline-none font-bold text-slate-800 transition-all thai-text"
                        placeholder="กิน&#10;ดื่ม&#10;อร่อย"></textarea>
                </div>
            </div>
            <div class="p-8 bg-slate-50 flex gap-4">
                <button onclick="app.hideModal()"
                    class="flex-1 py-4 font-bold text-slate-500 hover:bg-white rounded-2xl transition-all">取消</button>
                <button onclick="app.saveSet()"
                    class="flex-1 py-4 bg-indigo-600 text-white font-bold rounded-2xl shadow-lg shadow-indigo-100 hover:bg-indigo-700 transition-all">保存分组</button>
            </div>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, get, set, push, onValue, child, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA6MZ_p5lVuy8TMAqiuV6IRx9fggV44lQs",
            authDomain: "outpost-8d74e.firebaseapp.com",
            databaseURL: "https://outpost-dictionary-116208.asia-southeast1.firebasedatabase.app/",
            projectId: "outpost-8d74e",
            storageBucket: "outpost-8d74e.firebasestorage.app",
            messagingSenderId: "724993324937",
            appId: "1:724993324937:web:ce6c7e6b06489331c79358",
            measurementId: "G-QPHWRTH6BH"
        };

        const fbApp = initializeApp(firebaseConfig);
        const auth = getAuth(fbApp);
        const db = getDatabase(fbApp);

        class ThaiSetManager {
            constructor() {
                this.user = null;
                this.sets = {};
                this.currentSetId = null;
                this.allWordData = {}; // Cache of ThaiWordsListen

                // Set default API base to current origin if running on a server
                if (window.location.protocol.startsWith('http')) {
                    document.getElementById('api-base').value = window.location.origin;
                }

                this.initAuth();
            }

            initAuth() {
                const loginBtn = document.getElementById('btn-login');
                const logoutBtn = document.getElementById('btn-logout');

                loginBtn.onclick = async () => {
                    try {
                        const provider = new GoogleAuthProvider();
                        await signInWithPopup(auth, provider);
                    } catch (err) {
                        document.getElementById('login-error').innerText = err.message;
                        document.getElementById('login-error').classList.remove('hidden');
                    }
                };

                logoutBtn.onclick = () => signOut(auth);

                onAuthStateChanged(auth, (user) => {
                    this.user = user;
                    if (user) {
                        document.getElementById('login-screen').classList.add('hidden');
                        document.getElementById('app-container').classList.remove('hidden');
                        document.getElementById('user-avatar').src = user.photoURL;
                        this.loadData();
                    } else {
                        document.getElementById('login-screen').classList.remove('hidden');
                        document.getElementById('app-container').classList.add('hidden');
                    }
                });
            }

            getApiBase() {
                let base = document.getElementById('api-base').value.trim();
                // Default to current origin if empty
                if (!base && window.location.protocol.startsWith('http')) {
                    base = window.location.origin;
                } else if (!base) {
                    base = 'http://localhost:3000';
                }

                if (base.endsWith('/')) base = base.slice(0, -1);
                return base;
            }

            async loadData() {
                // Listen to word sets
                onValue(ref(db, 'learnThaiWordSets'), (snapshot) => {
                    this.sets = snapshot.val() || {};
                    this.renderSidebar();
                    // Reactively update current view if set membership changes
                    if (this.currentSetId && this.sets[this.currentSetId]) {
                        this.selectSet(this.currentSetId);
                    }
                });

                // Listen to all words for existence check
                onValue(ref(db, 'ThaiWordsListen'), (snapshot) => {
                    this.allWordData = snapshot.val() || {};
                    if (this.currentSetId) this.selectSet(this.currentSetId);
                });
            }

            renderSidebar() {
                const list = document.getElementById('set-list');
                const keys = Object.keys(this.sets).sort((a, b) => (this.sets[b].createdAt || 0) - (this.sets[a].createdAt || 0));

                if (keys.length === 0) {
                    list.innerHTML = '<div class="p-8 text-center text-slate-600 text-sm">暂无分组</div>';
                    return;
                }

                list.innerHTML = keys.map(id => {
                    const set = this.sets[id];
                    const active = this.currentSetId === id ? 'bg-indigo-600 text-white' : 'text-slate-400 hover:bg-slate-800 hover:text-slate-200';
                    return `
                        <div onclick="app.selectSet('${id}')" class="px-4 py-3 mx-2 rounded-xl cursor-pointer transition-all flex justify-between items-center group ${active}">
                            <div class="truncate pr-2">
                                <p class="text-sm font-bold truncate">${set.name}</p>
                                <p class="text-[9px] opacity-50 font-black uppercase tracking-tighter">${(set.words || []).length} Words</p>
                            </div>
                            <button onclick="event.stopPropagation(); app.deleteSet('${id}')" class="opacity-0 group-hover:opacity-100 p-1 hover:text-rose-500 transition-all">
                                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>
                            </button>
                        </div>
                    `;
                }).join('');
            }

            selectSet(id) {
                this.currentSetId = id;
                const set = this.sets[id];
                if (!set) return;

                document.getElementById('welcome-view').classList.add('hidden');
                document.getElementById('set-detail').classList.remove('hidden');

                document.getElementById('detail-name').innerText = set.name;
                document.getElementById('detail-count').innerText = (set.words || []).length;
                document.getElementById('detail-tags').innerHTML = (set.tags || []).map(t => `<span class="px-2 py-0.5 bg-slate-200 text-slate-500 rounded text-[10px] font-black uppercase tracking-widest">${t}</span>`).join('');

                this.renderWords(set.words || []);
                this.renderSidebar();
            }

            renderWords(words) {
                const container = document.getElementById('word-cards');
                container.innerHTML = words.map(word => {
                    const data = this.allWordData[word];
                    const exists = !!data;
                    const cardClass = exists ? 'bg-white border-slate-200' : 'bg-slate-50 border-dashed border-slate-300 opacity-80';

                    return `
                        <div class="glass-panel p-6 rounded-3xl border transition-all hover:shadow-xl hover:shadow-indigo-100 group relative ${cardClass}">
                            <div class="flex justify-between items-start mb-4">
                                <span class="thai-text text-3xl font-black text-slate-800">${word}</span>
                                ${exists ? `
                                    <div class="flex gap-2">
                                        <button onclick="app.fixAudio('${word}')" class="text-slate-400 hover:text-indigo-600 p-1.5 bg-slate-100 rounded-xl transition-all" title="修复音频">
                                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                                        </button>
                                        <div class="bg-green-100 text-green-600 p-1.5 rounded-xl">
                                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"></path></svg>
                                        </div>
                                    </div>
                                ` : `
                                    <button onclick="app.generateWord('${word}')" class="bg-indigo-600 text-white p-2 rounded-xl shadow-lg shadow-indigo-200 hover:scale-110 active:scale-95 transition-all">
                                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                                    </button>
                                `}
                            </div>
                            
                            ${exists ? `
                                <div class="space-y-3">
                                    <p class="text-lg font-bold text-slate-600">${data.translation?.chinese || '无翻译'}</p>
                                    <div class="flex gap-2">
                                        <span class="text-[10px] font-black text-indigo-400 uppercase bg-indigo-50 px-2 py-0.5 rounded-lg border border-indigo-100">${data.level}</span>
                                        <span class="text-[10px] font-black text-slate-400 uppercase bg-slate-100 px-2 py-0.5 rounded-lg">[ ${data.phonetic?.ipa || ''} ]</span>
                                    </div>
                                    <div class="pt-3 border-t border-slate-100">
                                        <p class="text-xs text-slate-400 line-clamp-2 italic">${data.meanings[0]?.thai_definition || ''}</p>
                                    </div>
                                </div>
                            ` : `
                                <div class="py-10 text-center">
                                    <p class="text-xs font-bold text-slate-400 uppercase tracking-widest">Missing JSON Content</p>
                                    <p class="text-[10px] text-slate-300 mt-1">点击闪电图标通过 AI 生成</p>
                                </div>
                            `}
                        </div>
                    `;
                }).join('');
            }

            async generateWord(word) {
                const status = document.createElement('div');
                status.className = "fixed bottom-8 right-8 bg-slate-900 text-white px-6 py-4 rounded-2xl shadow-2xl flex items-center gap-4 z-[200]";
                status.innerHTML = `
                    <div class="w-5 h-5 border-2 border-indigo-500 border-t-transparent rounded-full animate-spin"></div>
                    <span class="text-sm font-bold">正在生成单词 "${word}"...</span>
                `;
                document.body.appendChild(status);

                try {
                    const res = await fetch(`${this.getApiBase()}/api/thai-word-learning/generate`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ word })
                    });
                    const result = await res.json();
                    if (result.success) {
                        status.innerHTML = `<svg class="w-5 h-5 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg><span class="text-sm font-bold">"${word}" 生成成功!</span>`;
                        setTimeout(() => status.remove(), 2000);
                    } else {
                        throw new Error(result.error);
                    }
                } catch (err) {
                    status.innerHTML = `<svg class="w-5 h-5 text-rose-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg><span class="text-sm font-bold">错误: ${err.message}</span>`;
                    setTimeout(() => status.remove(), 4000);
                }
            }

            async fixAudio(word) {
                const status = document.createElement('div');
                status.className = "fixed bottom-8 right-8 bg-slate-900 text-white px-6 py-4 rounded-2xl shadow-2xl flex items-center gap-4 z-[200]";
                status.innerHTML = `
                    <div class="w-5 h-5 border-2 border-indigo-500 border-t-transparent rounded-full animate-spin"></div>
                    <span class="text-sm font-bold">正在修复 "${word}" 的音频...</span>
                `;
                document.body.appendChild(status);

                try {
                    const res = await fetch(`${this.getApiBase()}/api/thai-word-learning/fix-audio`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ word })
                    });
                    const result = await res.json();
                    if (result.success) {
                        status.innerHTML = `<svg class="w-5 h-5 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg><span class="text-sm font-bold">"${word}" 音频修复成功!</span>`;
                        setTimeout(() => status.remove(), 2000);
                    } else {
                        throw new Error(result.error);
                    }
                } catch (err) {
                    status.innerHTML = `<svg class="w-5 h-5 text-rose-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg><span class="text-sm font-bold">修复失败: ${err.message}</span>`;
                    setTimeout(() => status.remove(), 4000);
                }
            }

            showCreateModal() {
                this.isEditing = false;
                document.getElementById('modal-title').innerText = '新建单词集';
                document.getElementById('input-name').value = '';
                document.getElementById('input-tags').value = '';
                document.getElementById('input-words').value = '';
                document.getElementById('set-modal').classList.remove('hidden');
            }

            editCurrentSet() {
                const set = this.sets[this.currentSetId];
                if (!set) return;
                this.isEditing = true;
                document.getElementById('modal-title').innerText = '编辑单词集';
                document.getElementById('input-name').value = set.name;
                document.getElementById('input-tags').value = (set.tags || []).join(', ');
                document.getElementById('input-words').value = (set.words || []).join('\n');
                document.getElementById('set-modal').classList.remove('hidden');
            }

            hideModal() {
                document.getElementById('set-modal').classList.add('hidden');
            }

            async saveSet() {
                const name = document.getElementById('input-name').value.trim();
                const tagsStr = document.getElementById('input-tags').value.trim();
                const wordsStr = document.getElementById('input-words').value.trim();

                if (!name || !wordsStr) return alert('请填写名称和单词列表');

                const tags = tagsStr.split(',').map(s => s.trim()).filter(s => s);
                const words = wordsStr.split('\n').map(s => s.trim()).filter(s => s);

                const setData = {
                    name,
                    tags,
                    words,
                    updatedAt: Date.now()
                };

                if (this.isEditing) {
                    await set(ref(db, `learnThaiWordSets/${this.currentSetId}`), {
                        ...this.sets[this.currentSetId],
                        ...setData
                    });
                } else {
                    const newSetRef = push(ref(db, 'learnThaiWordSets'));
                    await set(newSetRef, {
                        ...setData,
                        createdAt: Date.now(),
                        createdBy: this.user.uid
                    });
                }

                this.hideModal();
            }

            async deleteSet(id) {
                if (confirm('确定要删除这个单词集吗?')) {
                    await remove(ref(db, `learnThaiWordSets/${id}`));
                    if (this.currentSetId === id) {
                        this.currentSetId = null;
                        document.getElementById('welcome-view').classList.remove('hidden');
                        document.getElementById('set-detail').classList.add('hidden');
                    }
                }
            }

            viewInApp() {
                if (this.currentSetId) {
                    window.open(`appLearnThaiWords.html?setId=${this.currentSetId}`, '_blank');
                }
            }

            async quickAddWord() {
                const input = document.getElementById('quick-add-input');
                const word = input.value.trim();
                if (!word || !this.currentSetId) return;

                const setData = this.sets[this.currentSetId];
                const words = [...(setData.words || [])];

                if (words.includes(word)) {
                    input.value = '';
                    return alert('该单词已在分组中');
                }

                words.push(word);

                try {
                    await set(ref(db, `learnThaiWordSets/${this.currentSetId}`), {
                        ...setData,
                        words,
                        updatedAt: Date.now()
                    });
                    input.value = '';
                    // The onValue listener will handle the UI refresh
                } catch (err) {
                    alert('添加失败: ' + err.message);
                }
            }
        }

        window.app = new ThaiSetManager();
    </script>
</body>

</html>
