<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pattern Review</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        .custom-scroll::-webkit-scrollbar {
            width: 6px;
        }

        .custom-scroll::-webkit-scrollbar-track {
            background: transparent;
        }

        .custom-scroll::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.05);
        }

        .input-underline {
            background: transparent;
            border: none;
            border-bottom: 2px solid #e2e8f0;
            border-radius: 0;
            padding: 8px 0;
            transition: all 0.3s ease;
        }

        .input-underline:focus {
            outline: none;
            border-bottom-color: #3b82f6;
            box-shadow: 0 1px 0 0 #3b82f6;
        }

        /* Animations */
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-slide-in {
            animation: slideIn 0.5s ease-out forwards;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-100 via-slate-50 to-blue-50 h-screen flex flex-col overflow-hidden text-slate-900">

    <!-- Header -->
    <header class="h-16 bg-white/80 backdrop-blur-md border-b border-slate-200 flex items-center justify-between px-6 shrink-0 z-30 shadow-sm relative">
        <div class="flex items-center gap-3">
            <div class="bg-blue-600 p-2 rounded-lg text-white shadow-md shadow-blue-200">
                <i data-lucide="book-open-check" class="w-5 h-5"></i>
            </div>
            <h1 class="font-bold text-xl tracking-tight">Pattern<span class="text-blue-600">Review</span></h1>
        </div>
        
        <div id="progress-container" class="hidden flex items-center gap-4">
            <div class="text-sm font-bold text-slate-500 bg-slate-100 px-3 py-1 rounded-full border border-slate-200">
                Pattern <span id="progress-current" class="text-blue-600">0</span> / <span id="progress-total">0</span>
            </div>
        </div>
    </header>

    <!-- Main Workspace -->
    <main class="flex-1 overflow-hidden relative">
        
        <!-- View: Loading -->
        <div id="view-loading" class="absolute inset-0 flex flex-col items-center justify-center bg-slate-50 z-20">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mb-4"></div>
            <p class="text-sm font-bold text-slate-500 uppercase tracking-widest">Loading Lesson Data...</p>
        </div>

        <!-- View: Error -->
        <div id="view-error" class="hidden absolute inset-0 flex flex-col items-center justify-center bg-slate-50 z-20">
            <div class="bg-red-100 text-red-600 p-4 rounded-full mb-4">
                <i data-lucide="alert-triangle" class="w-10 h-10"></i>
            </div>
            <h2 class="text-2xl font-bold mb-2">Error Loading Data</h2>
            <p id="error-message" class="text-slate-500 text-center max-w-md">Invalid or missing patternKey.</p>
        </div>

        <!-- View: Study Content -->
        <div id="view-study" class="hidden h-full flex flex-col items-center overflow-y-auto custom-scroll py-10 px-4">
            <div class="w-full max-w-3xl space-y-8 animate-slide-in">
                
                <!-- Pattern Header Card -->
                <div class="glass-card rounded-3xl p-8 relative overflow-hidden group">
                    <div class="absolute top-0 right-0 w-32 h-32 bg-blue-100 rounded-bl-full -z-10 transition-transform group-hover:scale-110"></div>
                    <span class="px-3 py-1 bg-blue-100 text-blue-700 rounded-md font-black text-xs uppercase tracking-[0.2em] mb-4 inline-block shadow-sm">Target Pattern</span>
                    <h2 id="study-format" class="text-3xl font-extrabold text-slate-800 mb-3 tracking-tight"></h2>
                    <p id="study-usage" class="text-slate-600 font-medium leading-relaxed bg-slate-50/50 p-4 rounded-xl border border-slate-100"></p>
                </div>

                <!-- Examples List -->
                <div id="study-examples" class="space-y-6">
                    <!-- Example cards injected here -->
                </div>

                <!-- Action Bar -->
                <div class="flex justify-end pt-4 pb-12">
                    <button id="btn-next" onclick="handleNext()" class="bg-slate-900 text-white px-8 py-4 rounded-2xl font-bold shadow-xl shadow-slate-200 hover:bg-blue-600 hover:shadow-blue-200 transition-all flex items-center gap-3 active:scale-95 group">
                        <span id="btn-next-text">Next Pattern</span>
                        <i data-lucide="arrow-right" class="w-5 h-5 group-hover:translate-x-1 transition-transform"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- View: Final Review -->
        <div id="view-review" class="hidden h-full flex flex-col items-center overflow-y-auto custom-scroll py-10 px-4 bg-slate-50">
            <div class="w-full max-w-4xl space-y-8 animate-slide-in">
                
                <div class="text-center space-y-3 mb-10">
                    <div class="inline-flex items-center justify-center w-20 h-20 bg-emerald-100 text-emerald-600 rounded-full mb-2 shadow-inner">
                        <i data-lucide="party-popper" class="w-10 h-10"></i>
                    </div>
                    <h2 class="text-4xl font-extrabold text-slate-900 tracking-tight">Session Complete!</h2>
                    <p class="text-slate-500 font-medium text-lg">Review your translations against the original meaning.</p>
                </div>

                <div id="review-content" class="space-y-12">
                    <!-- Review content injected here -->
                </div>

                <div class="flex justify-center pt-8 pb-12">
                    <button onclick="window.close()" class="bg-slate-200 text-slate-600 hover:bg-slate-300 px-8 py-3 rounded-xl font-bold transition">Close Window</button>
                </div>
            </div>
        </div>

    </main>

    <!-- Audio Element -->
    <audio id="audio-player" class="hidden"></audio>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // --- Firebase Configuration ---
        const firebaseConfig = {
            apiKey: "AIzaSyA6MZ_p5lVuy8TMAqiuV6IRx9fggV44lQs",
            authDomain: "outpost-8d74e.firebaseapp.com",
            databaseURL: "https://outpost-dictionary-116208.asia-southeast1.firebasedatabase.app/",
            projectId: "outpost-8d74e",
            storageBucket: "outpost-8d74e.firebasestorage.app",
            messagingSenderId: "724993324937",
            appId: "1:724993324937:web:ce6c7e6b06489331c79358",
            measurementId: "G-QPHWRTH6BH"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- App State ---
        let state = {
            data: null,
            patterns: [],
            currentIndex: 0
        };

        // --- Initialization ---
        window.onload = async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const patternKey = urlParams.get('patternKey');

            if (!patternKey) {
                showError("No 'patternKey' parameter found in the URL.");
                return;
            }

            try {
                const snapshot = await get(ref(db, `sentencePatterns/${patternKey}`));
                if (snapshot.exists()) {
                    state.data = snapshot.val();
                    if (state.data && state.data.patterns && state.data.patterns.length > 0) {
                        state.patterns = state.data.patterns;
                        document.getElementById('progress-total').innerText = state.patterns.length;
                        document.getElementById('progress-container').classList.remove('hidden');
                        renderStudyView();
                    } else {
                        showError("The requested pattern group contains no patterns.");
                    }
                } else {
                    showError("Pattern data not found in database.");
                }
            } catch (err) {
                showError("Database connection error: " + err.message);
            }
        };

        function showError(msg) {
            document.getElementById('view-loading').classList.add('hidden');
            document.getElementById('view-error').classList.remove('hidden');
            document.getElementById('error-message').innerText = msg;
            lucide.createIcons();
        }

        // --- Study View Rendering ---
        function renderStudyView() {
            document.getElementById('view-loading').classList.add('hidden');
            document.getElementById('view-study').classList.remove('hidden');

            const pattern = state.patterns[state.currentIndex];
            
            // Update Progress Header
            document.getElementById('progress-current').innerText = state.currentIndex + 1;

            // Render Header
            document.getElementById('study-format').innerText = pattern.format || 'N/A';
            document.getElementById('study-usage').innerText = pattern.usage ? `Usage: ${pattern.usage}` : 'No usage notes provided.';

            // Render Examples
            const examplesContainer = document.getElementById('study-examples');
            examplesContainer.innerHTML = '';

            if (pattern.examples && pattern.examples.length > 0) {
                pattern.examples.forEach((ex, idx) => {
                    const el = document.createElement('div');
                    el.className = "bg-white p-6 rounded-2xl shadow-sm border border-slate-200 transition focus-within:border-blue-400 focus-within:shadow-md";
                    el.innerHTML = `
                        <div class="flex items-start gap-4 mb-4">
                            <div class="flex-1">
                                <p class="text-xl font-bold text-slate-900 leading-relaxed">${ex.thai || ''}</p>
                                ${ex.text_romanization ? `<p class="text-xs text-slate-400 mt-1 font-mono">${ex.text_romanization}</p>` : ''}
                            </div>
                            ${ex.audioThai ? `
                                <button onclick="playAudio('${ex.audioThai}')" class="shrink-0 w-10 h-10 bg-slate-50 text-blue-600 rounded-full flex items-center justify-center hover:bg-blue-600 hover:text-white transition shadow-sm border border-slate-200" title="Play Audio">
                                    <i data-lucide="volume-2" class="w-5 h-5"></i>
                                </button>
                            ` : ''}
                        </div>
                        <div class="relative">
                            <span class="absolute left-0 top-3 text-slate-400"><i data-lucide="languages" class="w-4 h-4"></i></span>
                            <input type="text" 
                                id="input-en-${idx}"
                                placeholder="Type your English translation here..." 
                                class="input-underline w-full pl-7 text-slate-700 placeholder-slate-300 font-medium"
                                value="${ex.studentEn || ''}"
                                autocomplete="off"
                            >
                        </div>
                    `;
                    examplesContainer.appendChild(el);
                });
            } else {
                examplesContainer.innerHTML = '<div class="text-center p-8 text-slate-400 font-medium">No examples available for this pattern.</div>';
            }

            // Update Next Button Text
            const nextBtnText = document.getElementById('btn-next-text');
            if (state.currentIndex === state.patterns.length - 1) {
                nextBtnText.innerText = "Finish & Review";
            } else {
                nextBtnText.innerText = "Next Pattern";
            }

            // Reset animation
            const contentCard = document.querySelector('#view-study > div');
            contentCard.classList.remove('animate-slide-in');
            void contentCard.offsetWidth; // trigger reflow
            contentCard.classList.add('animate-slide-in');

            lucide.createIcons();
            
            // Auto focus first input if available
            setTimeout(() => {
                const firstInput = document.getElementById('input-en-0');
                if (firstInput) firstInput.focus();
            }, 100);
        }

        // --- Navigation ---
        window.handleNext = () => {
            const pattern = state.patterns[state.currentIndex];
            
            // Save inputs
            if (pattern.examples && pattern.examples.length > 0) {
                pattern.examples.forEach((ex, idx) => {
                    const inputEl = document.getElementById(`input-en-${idx}`);
                    if (inputEl) {
                        ex.studentEn = inputEl.value.trim();
                    }
                });
            }

            // Check if we should move to next or review
            if (state.currentIndex < state.patterns.length - 1) {
                state.currentIndex++;
                renderStudyView();
            } else {
                renderReviewView();
            }
        };

        // --- Audio ---
        window.playAudio = (url) => {
            const audio = document.getElementById('audio-player');
            audio.src = url;
            audio.play().catch(e => console.error("Audio play failed:", e));
        };

        // --- Review View Rendering ---
        function renderReviewView() {
            document.getElementById('view-study').classList.add('hidden');
            document.getElementById('progress-container').classList.add('hidden');
            document.getElementById('view-review').classList.remove('hidden');

            const reviewContainer = document.getElementById('review-content');
            reviewContainer.innerHTML = '';

            state.patterns.forEach((p, pIdx) => {
                const section = document.createElement('div');
                section.className = "bg-white rounded-3xl p-8 shadow-sm border border-slate-200";
                
                const header = document.createElement('div');
                header.className = "mb-6 pb-4 border-b border-slate-100 flex items-center justify-between";
                header.innerHTML = `
                    <div>
                        <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Pattern ${pIdx + 1}</span>
                        <h3 class="text-xl font-bold text-slate-800">${p.format}</h3>
                    </div>
                `;
                section.appendChild(header);

                const examplesGrid = document.createElement('div');
                examplesGrid.className = "space-y-6";

                if (p.examples) {
                    p.examples.forEach((ex, eIdx) => {
                        const item = document.createElement('div');
                        item.className = "bg-slate-50 rounded-2xl p-5 border border-slate-100";
                        
                        // Compare student input vs correct
                        const studentAns = ex.studentEn || '<span class="italic opacity-50">No answer provided</span>';
                        const correctAns = ex.english || 'N/A';
                        
                        item.innerHTML = `
                            <div class="flex gap-4 mb-4">
                                <div class="w-8 h-8 shrink-0 bg-blue-100 text-blue-600 font-bold rounded-full flex items-center justify-center text-sm">${eIdx + 1}</div>
                                <div class="flex-1">
                                    <p class="text-lg font-bold text-slate-800">${ex.thai}</p>
                                    ${ex.chinese ? `<p class="text-xs text-slate-500 font-medium mt-1">Hint: ${ex.chinese}</p>` : ''}
                                </div>
                            </div>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 pl-12">
                                <div class="bg-white p-3 rounded-xl border-l-4 border-l-purple-400 shadow-sm">
                                    <span class="text-[10px] font-bold text-slate-400 uppercase block mb-1">Your Translation</span>
                                    <p class="text-sm font-medium text-slate-700">${studentAns}</p>
                                </div>
                                <div class="bg-white p-3 rounded-xl border-l-4 border-l-emerald-400 shadow-sm">
                                    <span class="text-[10px] font-bold text-slate-400 uppercase block mb-1">Correct Meaning</span>
                                    <p class="text-sm font-medium text-emerald-700">${correctAns}</p>
                                </div>
                            </div>
                        `;
                        examplesGrid.appendChild(item);
                    });
                }
                
                section.appendChild(examplesGrid);
                reviewContainer.appendChild(section);
            });

            lucide.createIcons();
            document.getElementById('view-review').scrollTo({ top: 0, behavior: 'smooth' });
        }

    </script>
</body>
</html>
