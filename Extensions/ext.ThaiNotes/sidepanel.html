<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thai Notes Extractor</title>
  <style>
    :root {
      --primary-color: #6366f1;
      --primary-hover: #4f46e5;
      --bg-color: #f8fafc;
      --text-color: #1e293b;
      --border-color: #e2e8f0;
      --white: #ffffff;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      margin: 0;
      padding: 16px;
      display: flex;
      flex-direction: column;
      height: 100vh;
      box-sizing: border-box;
    }

    h1 {
      font-size: 1.25rem;
      margin-bottom: 1rem;
      color: var(--primary-color);
      text-align: center;
    }

    .controls {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    button {
      flex: 1;
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    #extract-btn {
      background-color: var(--primary-color);
      color: var(--white);
    }

    #extract-btn:hover {
      background-color: var(--primary-hover);
    }

    #export-btn {
      background-color: #10b981;
      color: var(--white);
    }

    #export-btn:hover {
      background-color: #059669;
    }

    .editor-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--white);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
    }

    textarea {
      flex: 1;
      width: 100%;
      border: none;
      padding: 16px;
      font-family: 'Fira Code', 'Courier New', Courier, monospace;
      font-size: 0.875rem;
      line-height: 1.5;
      resize: none;
      outline: none;
      color: #334155;
      background-color: transparent;
    }

    .status {
      font-size: 0.75rem;
      color: #64748b;
      margin-top: 8px;
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>Thai Notes JSON</h1>
  <div class="controls">
    <button id="extract-btn">Extract JSON</button>
    <button id="export-btn">Export File</button>
  </div>
  <div class="editor-container">
    <textarea id="json-editor" placeholder='{ "status": "Ready to extract..." }'></textarea>
  </div>
  <div id="status" class="status">Click extract on a Thai Notes lesson page</div>
  <script src="sidepanel.js"></script>
</body>
</html>
