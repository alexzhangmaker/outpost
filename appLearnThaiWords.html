<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>泰语单词学习 - Thai Word Learning</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=Inter:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --thai-font: 'Sarabun', sans-serif;
            --main-font: 'Inter', sans-serif;
            --accent: #4f46e5;
            --accent-hover: #4338ca;
            --sidebar-bg: #1e293b;
            --sidebar-hover: #334155;
            --sidebar-text: #cbd5e1;
        }

        body {
            font-family: var(--main-font);
            background: #f8fafc;
            color: #1e293b;
            overflow: hidden;
        }

        .thai-text {
            font-family: var(--thai-font);
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
        }

        .step-transition {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .progress-bar {
            height: 4px;
            transition: width 0.3s ease;
        }

        .card-hover:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }

        /* Sidebar scrollbar */
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.1);
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
        }

        .step-1-bg {
            background: linear-gradient(135deg, #eff6ff 0%, #dbeafe 100%);
        }

        .step-2-bg {
            background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%);
        }

        .step-3-bg {
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
        }

        .step-4-bg {
            background: linear-gradient(135deg, #fdf4ff 0%, #fae8ff 100%);
        }

        .hidden {
            display: none !important;
        }

        .fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        #login-screen {
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
        }
    </style>
</head>

<body class="h-screen flex flex-col">

    <!-- Login Screen -->
    <div id="login-screen" class="fixed inset-0 z-[100] flex items-center justify-center fade-in">
        <div
            class="glass-panel p-10 rounded-3xl text-center max-w-sm w-full mx-4 border-white/10 bg-white/5 backdrop-blur-3xl shadow-2xl">
            <div class="mb-8">
                <div
                    class="w-16 h-16 bg-indigo-600 rounded-2xl mx-auto flex items-center justify-center shadow-lg shadow-indigo-500/30 mb-4">
                    <span class="text-3xl font-bold text-white">泰</span>
                </div>
                <h1 class="text-2xl font-bold text-white">泰语单词学习</h1>
                <p class="text-slate-400 mt-2">请登录以开启您的学习旅程</p>
            </div>
            <button id="btn-login"
                class="w-full py-3.5 px-4 bg-white text-slate-900 rounded-xl font-bold shadow-xl hover:bg-slate-50 transform active:scale-95 transition-all flex items-center justify-center gap-3">
                <svg class="w-5 h-5" viewBox="0 0 24 24">
                    <path
                        d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                        fill="#4285F4" />
                    <path
                        d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                        fill="#34A853" />
                    <path
                        d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"
                        fill="#FBBC05" />
                    <path
                        d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                        fill="#EA4335" />
                </svg>
                Sign in with Google
            </button>
            <p id="login-error" class="text-rose-400 text-sm mt-4 hidden"></p>
        </div>
    </div>

    <!-- Main App Container -->
    <div id="app-container" class="flex flex-col h-full hidden">

        <!-- Top Navigation Bar -->
        <header class="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-6 shrink-0 z-10">
            <div class="flex items-center gap-3">
                <div
                    class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center font-bold text-white text-sm">
                    泰</div>
                <h1 class="text-lg font-bold text-slate-800 tracking-tight">Thai Learning <span
                        class="text-indigo-600">Console</span></h1>
            </div>

            <div class="flex items-center gap-6">
                <!-- User Profile -->
                <div class="flex items-center gap-3">
                    <div class="text-right hidden sm:block">
                        <p id="user-name" class="text-sm font-bold text-slate-800 leading-none mb-1">User Name</p>
                        <p id="user-email" class="text-[10px] text-slate-400 uppercase tracking-widest leading-none">
                            EMAIL@GMAIL.COM</p>
                    </div>
                    <img id="user-avatar" class="w-9 h-9 rounded-full ring-2 ring-indigo-50 bg-slate-100" src="" alt="">
                </div>
                <button id="btn-logout"
                    class="p-2 text-slate-400 hover:text-rose-500 hover:bg-rose-50 rounded-lg transition-all">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1">
                        </path>
                    </svg>
                </button>
            </div>
        </header>

        <div class="flex flex-1 overflow-hidden">
            <!-- Left Sidebar -->
            <aside class="w-72 bg-slate-900 flex flex-col shrink-0 border-r border-slate-800">
                <div class="p-4 border-b border-slate-800">
                    <div class="relative">
                        <input type="text" id="word-search" placeholder="搜索泰语单词..."
                            class="w-full bg-slate-800 border-none text-white text-sm rounded-xl py-2.5 pl-10 pr-4 placeholder-slate-500 focus:ring-2 focus:ring-indigo-500/50 transition-all">
                        <svg class="w-4 h-4 text-slate-500 absolute left-3.5 top-3" fill="none" stroke="currentColor"
                            viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                        </svg>
                    </div>
                </div>
                <!-- Word List -->
                <div id="word-list" class="flex-1 overflow-y-auto custom-scrollbar py-2">
                    <div class="p-8 text-center text-slate-600 animate-pulse">加载单词清单...</div>
                </div>
                <div class="p-4 bg-slate-950/50 border-t border-slate-800">
                    <div
                        class="flex items-center justify-between text-slate-500 text-[10px] font-bold uppercase tracking-widest">
                        <span>Database v1.0</span>
                        <span id="word-count">... words</span>
                    </div>
                </div>
            </aside>

            <!-- Right Content Area -->
            <main class="flex-1 flex flex-col overflow-hidden relative">
                <!-- Welcome/Placeholder View -->
                <div id="welcome-view" class="absolute inset-0 z-20 bg-slate-50 flex items-center justify-center p-8">
                    <div class="text-center max-w-md">
                        <div
                            class="w-20 h-20 bg-white shadow-xl rounded-3xl mx-auto flex items-center justify-center mb-6">
                            <svg class="w-10 h-10 text-indigo-500" fill="none" stroke="currentColor"
                                viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                                    d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253">
                                </path>
                            </svg>
                        </div>
                        <h2 class="text-2xl font-bold text-slate-800 mb-2">欢迎进入词汇学习</h2>
                        <p class="text-slate-500">从左侧清单中选择一个泰语单词，开始多维度的深度学习体验。</p>
                    </div>
                </div>

                <!-- Learning View Header -->
                <div id="learning-header" class="bg-white px-8 py-4 border-b border-slate-200 hidden">
                    <div class="flex justify-between items-center mb-3">
                        <div>
                            <h2 id="current-word-display" class="thai-text text-3xl font-bold text-slate-800">ยืดหยุ่น
                            </h2>
                            <p id="progress-text"
                                class="text-xs text-slate-400 font-bold uppercase tracking-widest mt-1">STEP 1: 单词讲解</p>
                        </div>
                        <span id="word-level"
                            class="px-3 py-1 bg-indigo-50 text-indigo-600 rounded-full text-xs font-bold ring-1 ring-indigo-100">LEVEL</span>
                    </div>
                    <div class="w-full bg-slate-100 rounded-full h-1 overflow-hidden">
                        <div id="progress-indicator" class="bg-indigo-600 h-full progress-bar" style="width: 25%"></div>
                    </div>
                </div>

                <!-- Learning Content Area -->
                <div id="content-scroll" class="flex-1 overflow-y-auto px-8 py-8 custom-scrollbar hidden">
                    <div id="learning-content" class="max-w-4xl mx-auto pb-32">
                        <!-- Content will be injected here -->
                    </div>
                </div>

                <!-- Bottom Navigation -->
                <div id="learning-nav"
                    class="absolute bottom-0 left-0 right-0 p-6 bg-gradient-to-t from-slate-50/90 via-slate-50/50 to-transparent backdrop-blur-sm hidden z-10">
                    <div class="max-w-4xl mx-auto flex justify-between items-center">
                        <button id="prev-btn" onclick="app.prevStep()"
                            class="px-6 py-2.5 rounded-xl font-bold text-slate-500 hover:bg-white hover:shadow-sm border border-transparent hover:border-slate-200 transition-all disabled:opacity-30 disabled:pointer-events-none">
                            上一步
                        </button>
                        <button id="next-btn" onclick="app.nextStep()"
                            class="px-10 py-3 bg-slate-900 text-white rounded-2xl font-bold shadow-xl shadow-slate-200 hover:bg-indigo-600 transform active:scale-95 transition-all">
                            下一步
                        </button>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, get, onValue, child } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // Firebase Configuration (Same as Anki Manager)
        const firebaseConfig = {
            apiKey: "AIzaSyA6MZ_p5lVuy8TMAqiuV6IRx9fggV44lQs",
            authDomain: "outpost-8d74e.firebaseapp.com",
            databaseURL: "https://outpost-dictionary-116208.asia-southeast1.firebasedatabase.app/",
            projectId: "outpost-8d74e",
            storageBucket: "outpost-8d74e.firebasestorage.app",
            messagingSenderId: "724993324937",
            appId: "1:724993324937:web:ce6c7e6b06489331c79358",
            measurementId: "G-QPHWRTH6BH"
        };

        // Initialize Firebase
        const fbApp = initializeApp(firebaseConfig);
        const auth = getAuth(fbApp);
        const db = getDatabase(fbApp);

        // --- Application State & Logic ---
        class ThaiLearningApp {
            constructor() {
                this.wordData = null;
                this.currentStep = 1;
                this.allWords = {};
                this.filteredList = [];
                this.user = null;

                this.initAuth();
                this.initSidebarSearch();
            }

            initAuth() {
                const loginScreen = document.getElementById('login-screen');
                const appContainer = document.getElementById('app-container');
                const loginBtn = document.getElementById('btn-login');
                const logoutBtn = document.getElementById('btn-logout');

                onAuthStateChanged(auth, (user) => {
                    if (user) {
                        this.user = user;
                        loginScreen.classList.add('hidden');
                        appContainer.classList.remove('hidden');

                        document.getElementById('user-name').textContent = user.displayName;
                        document.getElementById('user-email').textContent = user.email;
                        document.getElementById('user-avatar').src = user.photoURL || '';

                        this.loadWordList();
                    } else {
                        this.user = null;
                        loginScreen.classList.remove('hidden');
                        appContainer.classList.add('hidden');
                    }
                });

                loginBtn.onclick = () => {
                    const provider = new GoogleAuthProvider();
                    signInWithPopup(auth, provider).catch(err => {
                        const errEl = document.getElementById('login-error');
                        errEl.textContent = `登录失败: ${err.message}`;
                        errEl.classList.remove('hidden');
                    });
                };

                logoutBtn.onclick = () => signOut(auth);
            }

            async loadWordList() {
                const listEl = document.getElementById('word-list');
                const countEl = document.getElementById('word-count');
                const urlParams = new URLSearchParams(window.location.search);
                const setId = urlParams.get('setId');

                // 1. Load all word data first
                const wordsSnapshot = await get(ref(db, 'ThaiWordsListen'));
                if (!wordsSnapshot.exists()) {
                    listEl.innerHTML = '<div class="p-8 text-center text-slate-500">尚无学习数据</div>';
                    return;
                }
                this.allWords = wordsSnapshot.val();

                if (setId) {
                    // 2. Load set-specific word list
                    onValue(ref(db, `learnThaiWordSets/${setId}`), (setSnapshot) => {
                        if (setSnapshot.exists()) {
                            const setData = setSnapshot.val();
                            const setWords = setData.words || [];
                            // Filter filteredList to only include words that exist in both the set and our data
                            this.filteredList = setWords.filter(w => this.allWords[w]);

                            // Optional: Update title to show set name
                            document.querySelector('h1.text-lg').innerHTML = `Thai Learning <span class="text-indigo-400 text-sm ml-2 font-medium">/ ${setData.name}</span>`;

                            this.renderSidebar();
                            countEl.textContent = `${this.filteredList.length} in set`;
                        } else {
                            // Fallback if setId is invalid
                            this.filteredList = Object.keys(this.allWords);
                            this.renderSidebar();
                            countEl.textContent = `${this.filteredList.length} words (all)`;
                        }
                    });
                } else {
                    // 3. Normal behavior: show all words
                    onValue(ref(db, 'ThaiWordsListen'), (snapshot) => {
                        if (snapshot.exists()) {
                            this.allWords = snapshot.val();
                            this.filteredList = Object.keys(this.allWords);
                            this.renderSidebar();
                            countEl.textContent = `${this.filteredList.length} words`;
                        }
                    });
                }
            }

            initSidebarSearch() {
                const searchInput = document.getElementById('word-search');
                searchInput.oninput = (e) => {
                    const term = e.target.value.toLowerCase();
                    this.filteredList = Object.keys(this.allWords).filter(w => w.toLowerCase().includes(term));
                    this.renderSidebar();
                };
            }

            renderSidebar() {
                const listEl = document.getElementById('word-list');
                if (this.filteredList.length === 0) {
                    listEl.innerHTML = '<div class="p-4 text-center text-slate-600 text-sm italic">未找到匹配单词</div>';
                    return;
                }

                listEl.innerHTML = this.filteredList.map(wordKey => {
                    const item = this.allWords[wordKey];
                    const selectedClass = this.wordData?.word === wordKey ? 'bg-indigo-600/10 border-indigo-500/50 text-white' : 'border-transparent text-slate-400 hover:bg-slate-800/50 hover:text-slate-200';
                    const chinese = item.translation?.chinese || '';

                    return `
                        <div onclick="app.selectWord('${wordKey}')" class="px-4 py-3 mx-2 mb-1 rounded-xl border cursor-pointer transition-all ${selectedClass}">
                            <div class="flex justify-between items-start">
                                <span class="thai-text text-lg font-bold">${wordKey}</span>
                                <span class="text-[9px] font-bold bg-slate-800 px-1.5 py-0.5 rounded text-slate-500">${item.level || 'A2'}</span>
                            </div>
                            <p class="text-xs truncate opacity-60 mt-0.5">${chinese}</p>
                        </div>
                    `;
                }).join('');
            }

            selectWord(wordKey) {
                this.wordData = this.allWords[wordKey];
                this.currentStep = 1;

                // Hide welcome, show content
                document.getElementById('welcome-view').classList.add('hidden');
                document.getElementById('learning-header').classList.remove('hidden');
                document.getElementById('content-scroll').classList.remove('hidden');
                document.getElementById('learning-nav').classList.remove('hidden');

                // Update UI
                document.getElementById('current-word-display').textContent = this.wordData.word;
                document.getElementById('word-level').textContent = this.wordData.level;

                this.render();
                this.renderSidebar(); // Refresh selected state
            }

            nextStep() {
                if (this.currentStep < 4) {
                    this.currentStep++;
                    this.render();
                }
            }

            prevStep() {
                if (this.currentStep > 1) {
                    this.currentStep--;
                    this.render();
                }
            }

            updateProgress() {
                const progress = (this.currentStep / 4) * 100;
                document.getElementById('progress-indicator').style.width = `${progress}%`;

                const stepNames = ["单词讲解", "用例学习", "词汇扩展", "综合练习"];
                document.getElementById('progress-text').textContent = `STEP ${this.currentStep}: ${stepNames[this.currentStep - 1]}`;
                document.getElementById('prev-btn').disabled = (this.currentStep === 1);
                document.getElementById('next-btn').textContent = (this.currentStep === 4) ? '完成学习' : '下一步';
            }

            render() {
                if (!this.wordData) return;
                this.updateProgress();

                const container = document.getElementById('learning-content');
                container.innerHTML = '';

                let view;
                switch (this.currentStep) {
                    case 1: view = this.createExplanationView(this.wordData); break;
                    case 2: view = this.createExampleView(this.wordData); break;
                    case 3: view = this.createExpansionView(this.wordData); break;
                    case 4: view = this.createExerciseView(this.wordData); break;
                }

                view.classList.add('fade-in');
                container.appendChild(view);
                document.getElementById('content-scroll').scrollTo({ top: 0, behavior: 'smooth' });
            }

            playAudio(url) {
                if (!url || url === 'undefined' || url === 'null') {
                    console.warn('Audio URL is missing or invalid:', url);
                    return;
                }
                try {
                    const audio = new Audio(url);
                    audio.play().catch(err => console.error('Audio playback failed:', err));
                } catch (err) {
                    console.error('Failed to create Audio object:', err);
                }
            }

            createExplanationView(word) {
                const div = document.createElement('div');
                div.className = "space-y-8";
                div.innerHTML = `
                    <div class="glass-panel rounded-3xl p-10 text-center step-1-bg relative overflow-hidden">
                        <div class="absolute top-4 right-4">
                            <button onclick="app.playAudio('${word.audioURL}')" class="w-12 h-12 bg-white rounded-2xl shadow-xl flex items-center justify-center text-indigo-500 hover:scale-110 active:scale-95 transition-all">
                                <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M12 5V19L7 14H3V10H7L12 5Z"></path><path d="M15 12C15 10.23 13.97 8.71 12.5 8V16C13.97 15.29 15 13.77 15 12Z"></path><path d="M17.5 12C17.5 8.49 14.95 5.59 11.5 5.07V7.12C13.84 7.61 15.61 9.61 15.61 12C15.61 14.39 13.84 16.39 11.5 16.88V18.93C14.95 18.41 17.5 15.51 17.5 12Z"></path></svg>
                            </button>
                        </div>
                        <h2 class="thai-text text-7xl font-bold text-slate-800 mb-4">${word.word}</h2>
                        <div class="flex justify-center gap-4 text-slate-500 mb-8 font-medium">
                            <span class="bg-white/50 px-3 py-1 rounded-lg border border-white/50 text-indigo-600">[ ${word.phonetic?.ipa || ''} ]</span>
                        </div>
                        <div class="space-y-2">
                            <p class="text-3xl text-slate-700 font-bold tracking-tight">${word.translation?.chinese || ''}</p>
                            <p class="text-lg text-slate-400 font-medium">${word.translation?.english || ''}</p>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        ${word.meanings.map(m => `
                            <div class="glass-panel p-8 rounded-3xl bg-white card-hover transition-all">
                                <div class="flex items-center gap-2 mb-4">
                                    <span class="px-3 py-1 bg-indigo-50 text-indigo-600 rounded-lg text-xs font-bold ring-1 ring-indigo-100">${m.type === 'literal' ? '字面义' : '引申义'}</span>
                                    <div class="flex gap-1">
                                        ${m.part_of_speech.map(p => `<span class="px-2 py-0.5 bg-slate-100 text-slate-400 rounded text-[10px] font-bold uppercase">${p}</span>`).join('')}
                                    </div>
                                </div>
                                <p class="text-slate-700 text-lg leading-relaxed mb-6 font-medium">${m.definition}</p>
                                <div class="bg-slate-50/50 p-6 rounded-2xl border border-slate-100">
                                    <p class="thai-text text-slate-500 italic leading-relaxed">${m.thai_definition}</p>
                                </div>
                            </div>
                        `).join('')}
                    </div>

                    ${word.cultural_notes ? `
                        <div class="bg-white border border-amber-100/50 p-8 rounded-3xl shadow-sm relative overflow-hidden group">
                            <div class="absolute -right-12 -top-12 w-48 h-48 bg-amber-50 rounded-full blur-3xl opacity-50 group-hover:opacity-80 transition-opacity"></div>
                            <h3 class="flex items-center gap-2 font-bold text-amber-600 mb-4 relative z-10">
                                <span class="p-2 bg-amber-100 rounded-xl">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
                                </span>
                                文化注释 Cultural Notes
                            </h3>
                            <p class="text-slate-600 leading-relaxed relative z-10">${word.cultural_notes}</p>
                        </div>
                    ` : ''}
                `;
                return div;
            }

            createExampleView(word) {
                const div = document.createElement('div');
                div.className = "space-y-10";
                div.innerHTML = `
                    <div class="flex items-center justify-between">
                        <h3 class="text-2xl font-bold text-slate-800">深度用例解析</h3>
                        <div class="flex gap-4 text-[10px] font-bold uppercase tracking-widest text-slate-400">
                            <span class="flex items-center gap-1.5"><span class="w-2 h-2 rounded-full bg-indigo-500"></span> 物理属性</span>
                            <span class="flex items-center gap-1.5"><span class="w-2 h-2 rounded-full bg-amber-500"></span> 抽象概念</span>
                        </div>
                    </div>
                    <div class="grid grid-cols-1 gap-6">
                        ${word.example_sentences.map(ex => `
                            <div class="glass-panel p-8 rounded-3xl bg-white border-l-8 ${ex.context === 'literal' ? 'border-indigo-500' : 'border-amber-500'} card-hover transition-all">
                                <div class="flex justify-between items-start gap-4 mb-4">
                                    <div class="space-y-3 flex-1">
                                        <div class="flex items-center gap-3">
                                            <p class="thai-text text-2xl font-bold text-slate-800 leading-tight">${ex.sentence}</p>
                                            <button onclick="app.playAudio('${ex.audioURL}')" class="p-2 text-indigo-500 hover:bg-indigo-50 rounded-lg transition-colors">
                                                <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M12 5V19L7 14H3V10H7L12 5Z"></path></svg>
                                            </button>
                                        </div>
                                        <p class="text-slate-600 text-lg font-medium">${ex.translation}</p>
                                    </div>
                                    <span class="shrink-0 px-2 py-1 bg-slate-100 text-slate-400 rounded text-[9px] font-black uppercase">EXAMPLE ${ex.id}</span>
                                </div>
                                <div class="bg-indigo-50/50 p-4 rounded-2xl">
                                    <p class="text-sm text-indigo-600/80 font-medium italic mb-1 uppercase text-[10px] tracking-widest">Context Analysis</p>
                                    <p class="text-sm text-indigo-900/70 leading-relaxed font-medium">${ex.analysis}</p>
                                    ${ex.vocabulary_note ? `<p class="mt-2 text-xs text-slate-400"><strong class="text-slate-500">Note:</strong> ${ex.vocabulary_note}</p>` : ''}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
                return div;
            }

            createExpansionView(word) {
                const div = document.createElement('div');
                div.className = "space-y-12";

                const sections = [
                    { title: '同义互换 Synonyms', data: word.synonyms, color: 'indigo' },
                    { title: '反义对比 Antonyms', data: word.antonyms, color: 'rose' }
                ];

                div.innerHTML = `
                    <div class="grid grid-cols-1 gap-12">
                        ${sections.map(s => `
                            <section>
                                <h3 class="text-2xl font-bold text-slate-800 mb-6 flex items-center gap-3">
                                    <span class="w-2 h-8 bg-${s.color}-500 rounded-full shadow-lg shadow-${s.color}-200"></span>
                                    ${s.title}
                                </h3>
                                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    ${s.data.map(item => `
                                        <div class="glass-panel p-6 rounded-3xl bg-white group hover:border-${s.color}-200 transition-all">
                                            <div class="flex justify-between items-center mb-3">
                                                <div class="flex items-center gap-2">
                                                    <span class="thai-text text-2xl font-bold text-slate-800">${item.word}</span>
                                                    <button onclick="app.playAudio('${item.audioURL}')" class="p-1.5 text-slate-400 hover:text-indigo-500 transition-colors">
                                                        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M12 5V19L7 14H3V10H7L12 5Z"></path></svg>
                                                    </button>
                                                </div>
                                                <span class="text-[9px] font-black text-slate-300 uppercase bg-slate-50 px-2 py-1 rounded-lg">${item.part_of_speech}</span>
                                            </div>
                                            <p class="text-sm font-bold text-slate-600 mb-3">${item.meaning}</p>
                                            <div class="p-3 bg-slate-50 rounded-xl border border-slate-100 opacity-80 group-hover:opacity-100 transition-opacity">
                                                <p class="text-[11px] text-slate-500 leading-relaxed font-medium">${item.usage_notes}</p>
                                            </div>
                                        </div>
                                    `).join('')}
                                </div>
                            </section>
                        `).join('')}

                        <section class="bg-indigo-600 rounded-[40px] p-10 text-white shadow-2xl shadow-indigo-200 relative overflow-hidden">
                            <div class="absolute -right-20 -top-20 w-64 h-64 bg-white/10 rounded-full blur-3xl"></div>
                            <h3 class="text-2xl font-bold mb-8 flex items-center gap-3 relative z-10">
                                <div class="p-2 bg-white/20 rounded-xl">
                                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                                </div>
                                词族成员 Word Family
                            </h3>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 relative z-10">
                                ${word.word_family.map(f => `
                                    <div class="bg-white/10 backdrop-blur-xl border border-white/20 p-8 rounded-3xl group">
                                        <div class="flex justify-between items-center mb-4">
                                            <div class="flex items-center gap-2">
                                                <span class="thai-text text-3xl font-black">${f.form}</span>
                                                <button onclick="app.playAudio('${f.audioURL}')" class="p-1.5 text-white/50 hover:text-white transition-colors">
                                                    <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M12 5V19L7 14H3V10H7L12 5Z"></path></svg>
                                                </button>
                                            </div>
                                            <span class="text-[9px] font-black px-2.5 py-1 bg-white/20 rounded-lg uppercase">${f.part_of_speech}</span>
                                        </div>
                                        <p class="text-indigo-100 font-bold mb-6 text-lg">${f.meaning}</p>
                                        <div class="bg-black/10 p-5 rounded-2xl group-hover:bg-black/20 transition-all">
                                            <div class="flex items-center gap-2 mb-2">
                                                <p class="thai-text font-bold text-white/90 leading-tight">${f.example.sentence}</p>
                                                <button onclick="app.playAudio('${f.example.audioURL}')" class="shrink-0 p-1 bg-white/10 rounded-md">
                                                    <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 24 24"><path d="M12 5V19L7 14H3V10H7L12 5Z"></path></svg>
                                                </button>
                                            </div>
                                            <p class="text-sm text-indigo-100/60 font-medium">${f.example.translation}</p>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </section>
                    </div>
                `;
                return div;
            }

            createExerciseView(word) {
                const div = document.createElement('div');
                div.className = "space-y-12 pb-20";

                div.innerHTML = `
                    <div class="text-center mb-12">
                        <div class="w-16 h-16 bg-white shadow-lg rounded-2xl flex items-center justify-center mx-auto mb-4">
                            <svg class="w-8 h-8 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"></path></svg>
                        </div>
                        <h3 class="text-3xl font-black text-slate-800 mb-2 tracking-tight">掌握度自测</h3>
                        <p class="text-slate-400 font-medium">通过高频练习巩固所学深度知识</p>
                    </div>

                    <div class="space-y-10">
                        ${word.exercises.map((ex, exIdx) => `
                            <div class="glass-panel p-10 rounded-[40px] bg-white border-slate-200/50 relative">
                                <div class="absolute -top-6 left-10 w-12 h-12 bg-indigo-600 text-white rounded-2xl flex items-center justify-center font-black text-xl shadow-xl shadow-indigo-200 ring-4 ring-white">
                                    ${exIdx + 1}
                                </div>
                                <div class="mb-10 mt-2">
                                    <h4 class="text-2xl font-bold text-slate-800 mb-1">${ex.title}</h4>
                                    <p class="text-slate-400 font-medium text-sm tracking-wide uppercase">${ex.description}</p>
                                </div>
                                
                                <div class="space-y-8">
                                    ${ex.questions ? ex.questions.map((q, qIdx) => `
                                        <div class="p-8 rounded-3xl bg-slate-50 border border-slate-100 group">
                                            <div class="space-y-4">
                                                <div class="flex justify-between items-start gap-6">
                                                    <div class="flex items-center gap-3">
                                                        <p class="thai-text text-xl text-slate-800 font-bold leading-relaxed">${q.sentence || q.question}</p>
                                                        ${q.audioURL ? `
                                                            <button onclick="app.playAudio('${q.audioURL}')" class="p-2 text-indigo-500 bg-white rounded-xl shadow-sm hover:scale-110 transition-transform">
                                                                <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M12 5V19L7 14H3V10H7L12 5Z"></path></svg>
                                                            </button>
                                                        ` : ''}
                                                    </div>
                                                </div>
                                                <p class="text-sm text-slate-400 font-medium">译：${q.translation || '见指令'}</p>
                                                
                                                <div class="flex flex-wrap gap-4 mt-6">
                                                    ${ex.type === 'context_identification' ? `
                                                        <button onclick="app.checkAnswer(this, '${q.answer}', 'literal')" class="flex-1 py-3.5 bg-white border border-slate-200 rounded-2xl text-sm font-bold text-slate-600 shadow-sm hover:border-indigo-400 hover:text-indigo-600 transition-all">物理属性 (Literal)</button>
                                                        <button onclick="app.checkAnswer(this, '${q.answer}', 'figurative')" class="flex-1 py-3.5 bg-white border border-slate-200 rounded-2xl text-sm font-bold text-slate-600 shadow-sm hover:border-indigo-400 hover:text-indigo-600 transition-all">抽象概念 (Figurative)</button>
                                                    ` : ex.type === 'sentence_completion' ? `
                                                        <div class="w-full relative">
                                                            <input type="text" onchange="app.checkInput(this, '${q.answer}')" placeholder="在此输入泰语回答..." 
                                                                   class="w-full p-4 bg-white border border-slate-200 rounded-2xl text-slate-800 font-bold outline-none focus:ring-4 focus:ring-indigo-100 transition-all shadow-sm">
                                                            <div class="absolute right-4 top-4 text-xs font-black text-slate-200 uppercase tracking-widest pointer-events-none">ENTER</div>
                                                        </div>
                                                    ` : `
                                                        <div class="w-full bg-indigo-50/50 p-6 rounded-2xl border border-indigo-100/50">
                                                            <div class="flex items-center gap-2 mb-2 text-indigo-600 font-black text-[10px] uppercase tracking-[0.2em]">Reflective Thinking</div>
                                                            <p class="text-sm text-indigo-900/80 font-medium leading-relaxed">${q.explanation || '请结合词义与生活经验进行思考。'}</p>
                                                        </div>
                                                    `}
                                                </div>
                                            </div>
                                        </div>
                                    `).join('') : `
                                        <div class="space-y-6">
                                            <div class="p-8 bg-indigo-50 rounded-[32px] border-2 border-dashed border-indigo-200">
                                                <div class="flex items-center gap-3 mb-4">
                                                    <span class="p-2 bg-white rounded-xl text-indigo-600 shadow-sm"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg></span>
                                                    <p class="text-lg font-bold text-indigo-900">${ex.title}</p>
                                                </div>
                                                <p class="text-indigo-900/60 font-medium text-sm mb-6">${ex.prompt || '结合今日所学单词及其引申义，尝试写出一个段落。'}</p>
                                                <textarea rows="5" class="w-full p-6 rounded-3xl border border-indigo-100 outline-none focus:ring-4 focus:ring-indigo-200/50 transition-all shadow-inner text-indigo-900 font-medium" placeholder="开始您的写作实践..."></textarea>
                                                <div class="flex justify-between items-center mt-4">
                                                    <div class="flex mb-1 items-center gap-2 px-3 py-1 bg-white rounded-lg text-[9px] text-indigo-400 font-black uppercase tracking-widest ring-1 ring-indigo-100">
                                                        Limit: ${ex.word_limit || '50-100 words'}
                                                    </div>
                                                    <p class="text-[10px] font-black text-indigo-300 uppercase tracking-tighter italic">Self-Reflection Exercise</p>
                                                </div>
                                            </div>
                                        </div>
                                    `}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
                return div;
            }

            checkAnswer(btn, correct, selected) {
                const parent = btn.parentElement;
                const buttons = parent.querySelectorAll('button');
                buttons.forEach(b => {
                    b.disabled = true;
                    b.classList.remove('hover:border-indigo-400', 'hover:text-indigo-600');
                    if (b === btn) {
                        if (selected === correct) {
                            b.classList.add('bg-green-500', 'text-white', 'border-green-500', 'shadow-green-100');
                        } else {
                            b.classList.add('bg-rose-500', 'text-white', 'border-rose-500', 'shadow-rose-100');
                        }
                    } else if (b.innerText.toLowerCase().includes(correct)) {
                        b.classList.add('border-green-500', 'text-green-600', 'bg-green-50/50');
                    }
                });
            }

            checkInput(input, correct) {
                if (input.value.trim() === correct) {
                    input.classList.add('border-green-500', 'bg-green-50', 'ring-green-100');
                    input.classList.remove('border-rose-500', 'bg-rose-50', 'ring-rose-100');
                } else {
                    input.classList.add('border-rose-500', 'bg-rose-50', 'ring-rose-100');
                    input.classList.remove('border-green-500', 'bg-green-50', 'ring-green-100');
                }
            }
        }

        // Global app instance
        const app = new ThaiLearningApp();
        window.app = app;
    </script>
</body>

</html>
