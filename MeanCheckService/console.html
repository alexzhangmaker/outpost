<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeanCheck 控制台 - 语义评估日志管理</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;600;800;900&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        outfit: ['Outfit', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            min-height: 100vh;
        }
        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .text-gradient {
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(15, 23, 42, 0.5);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(99, 102, 241, 0.3);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(99, 102, 241, 0.5);
        }
    </style>
</head>
<body class="text-slate-100 py-10 px-4 md:px-8">
    <div class="max-w-7xl mx-auto space-y-8">
        
        <!-- Header -->
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 border-b border-slate-800 pb-6">
            <div>
                <h1 class="font-outfit text-4xl font-black tracking-tight text-gradient">MeanCheck Service</h1>
                <p class="text-slate-400 mt-2 text-sm">语义评估日志管理控制台 | 实时监控学生翻译校验结果与大模型分析记录</p>
            </div>
            <div class="flex items-center gap-3">
                <button onclick="fetchRecords()" class="inline-flex items-center gap-2 px-4 py-2.5 bg-indigo-600/20 hover:bg-indigo-600/30 text-indigo-400 hover:text-indigo-300 border border-indigo-500/20 rounded-xl text-xs font-bold transition-all">
                    <svg id="refresh-icon" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 1121.228 9h-2.79"></path>
                    </svg>
                    刷新日志
                </button>
            </div>
        </header>

        <!-- Stats Overview -->
        <section class="grid grid-cols-1 sm:grid-cols-3 gap-6">
            <div class="glass-panel p-6 rounded-3xl flex flex-col justify-between">
                <span class="text-xs font-black tracking-widest text-slate-400 uppercase">总评估次数</span>
                <span id="stat-total" class="text-5xl font-black font-outfit mt-4 text-indigo-300">0</span>
                <span class="text-[10px] text-slate-500 mt-2">数据库记录总数</span>
            </div>
            <div class="glass-panel p-6 rounded-3xl flex flex-col justify-between">
                <span class="text-xs font-black tracking-widest text-slate-400 uppercase">评估正确率</span>
                <span id="stat-accuracy" class="text-5xl font-black font-outfit mt-4 text-emerald-400">0%</span>
                <span class="text-[10px] text-slate-500 mt-2">Is Correct = true 的比例</span>
            </div>
            <div class="glass-panel p-6 rounded-3xl flex flex-col justify-between">
                <span class="text-xs font-black tracking-widest text-slate-400 uppercase">快速匹配占比</span>
                <span id="stat-quick" class="text-5xl font-black font-outfit mt-4 text-purple-400">0%</span>
                <span class="text-[10px] text-slate-500 mt-2">基于本地缓存或正则判断的占比</span>
            </div>
        </section>

        <!-- Filter & Search Controls -->
        <section class="glass-panel p-6 rounded-3xl space-y-4">
            <div class="flex flex-col md:flex-row gap-4 items-center justify-between">
                <!-- Search inputs -->
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 w-full md:w-auto md:flex-1">
                    <input type="text" id="search-input" oninput="applyFilters()" placeholder="搜索学生回答..." 
                        class="w-full md:max-w-md px-4 py-3 bg-slate-900/60 border border-slate-700/50 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none text-sm text-slate-200 placeholder-slate-500 transition-all">
                    <input type="text" id="search-standard" oninput="applyFilters()" placeholder="搜索标准答案..." 
                        class="w-full md:max-w-md px-4 py-3 bg-slate-900/60 border border-slate-700/50 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none text-sm text-slate-200 placeholder-slate-500 transition-all">
                </div>
                <!-- Filter Chips -->
                <div class="flex gap-2 self-start md:self-auto">
                    <button onclick="setFilter('all')" id="btn-filter-all" class="px-4 py-2 rounded-xl text-xs font-bold transition-all bg-indigo-600 text-white">全部</button>
                    <button onclick="setFilter('correct')" id="btn-filter-correct" class="px-4 py-2 rounded-xl text-xs font-bold transition-all bg-slate-800 text-slate-400 hover:text-slate-200">正确</button>
                    <button onclick="setFilter('incorrect')" id="btn-filter-incorrect" class="px-4 py-2 rounded-xl text-xs font-bold transition-all bg-slate-800 text-slate-400 hover:text-slate-200">错误</button>
                </div>
            </div>
        </section>

        <!-- Logs Table -->
        <main class="glass-panel rounded-3xl overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-900/80 text-slate-400 border-b border-slate-800 text-[10px] uppercase font-black tracking-widest">
                            <th class="py-4 px-6">ID / 评估时间</th>
                            <th class="py-4 px-6">评估文本 (学生 vs 标准)</th>
                            <th class="py-4 px-6">匹配结果</th>
                            <th class="py-4 px-6">评估分类 / 解析理由</th>
                            <th class="py-4 px-6 text-center">操作</th>
                        </tr>
                    </thead>
                    <tbody id="logs-container" class="divide-y divide-slate-800/40 text-sm">
                        <!-- Rows populated by JavaScript -->
                        <tr>
                            <td colspan="5" class="py-12 text-center text-slate-500">
                                <div class="w-8 h-8 border-2 border-indigo-500 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
                                正在加载评估记录...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>

    </div>

    <!-- Notification system -->
    <div id="toast" class="fixed bottom-6 right-6 px-5 py-3 rounded-2xl bg-slate-900 border border-slate-700/80 text-white font-semibold text-xs shadow-2xl flex items-center gap-3 transform translate-y-20 opacity-0 transition-all duration-300 z-50">
        <span id="toast-msg">提示消息</span>
    </div>

    <script>
        let allRecords = [];
        let activeFilter = 'all'; // all, correct, incorrect

        function showToast(msg, isError = false) {
            const toast = document.getElementById('toast');
            const msgEl = document.getElementById('toast-msg');
            msgEl.innerText = msg;
            if (isError) {
                toast.classList.add('border-rose-500/30', 'text-rose-400');
            } else {
                toast.classList.remove('border-rose-500/30', 'text-rose-400');
            }
            toast.classList.remove('translate-y-20', 'opacity-0');
            
            setTimeout(() => {
                toast.classList.add('translate-y-20', 'opacity-0');
            }, 3000);
        }

        async function fetchRecords() {
            const icon = document.getElementById('refresh-icon');
            icon.classList.add('animate-spin');
            
            try {
                const res = await fetch('/records');
                if (!res.ok) throw new Error('无法连接到日志接口');
                allRecords = await res.json();
                
                calculateStats();
                applyFilters();
            } catch (err) {
                console.error(err);
                showToast(err.message, true);
                document.getElementById('logs-container').innerHTML = `
                    <tr>
                        <td colspan="5" class="py-12 text-center text-rose-400 font-bold">
                            加载失败: ${err.message}
                        </td>
                    </tr>
                `;
            } finally {
                setTimeout(() => icon.classList.remove('animate-spin'), 600);
            }
        }

        function calculateStats() {
            const total = allRecords.length;
            document.getElementById('stat-total').innerText = total;

            if (total === 0) {
                document.getElementById('stat-accuracy').innerText = '0%';
                document.getElementById('stat-quick').innerText = '0%';
                return;
            }

            const correct = allRecords.filter(r => r.is_correct === 1).length;
            const accuracy = Math.round((correct / total) * 100);
            document.getElementById('stat-accuracy').innerText = `${accuracy}%`;

            const quick = allRecords.filter(r => r.category === '快速匹配').length;
            const quickRatio = Math.round((quick / total) * 100);
            document.getElementById('stat-quick').innerText = `${quickRatio}%`;
        }

        function setFilter(filter) {
            activeFilter = filter;
            
            // Toggle active classes
            const btns = {
                all: document.getElementById('btn-filter-all'),
                correct: document.getElementById('btn-filter-correct'),
                incorrect: document.getElementById('btn-filter-incorrect')
            };

            Object.keys(btns).forEach(key => {
                if (key === filter) {
                    btns[key].className = "px-4 py-2 rounded-xl text-xs font-bold transition-all bg-indigo-600 text-white";
                } else {
                    btns[key].className = "px-4 py-2 rounded-xl text-xs font-bold transition-all bg-slate-800 text-slate-400 hover:text-slate-200";
                }
            });

            applyFilters();
        }

        function applyFilters() {
            const searchInput = document.getElementById('search-input').value.toLowerCase().trim();
            const searchStandard = document.getElementById('search-standard').value.toLowerCase().trim();
            const container = document.getElementById('logs-container');

            let filtered = [...allRecords];

            // 1. Status Filter
            if (activeFilter === 'correct') {
                filtered = filtered.filter(r => r.is_correct === 1);
            } else if (activeFilter === 'incorrect') {
                filtered = filtered.filter(r => r.is_correct === 0);
            }

            // 2. Student input Search
            if (searchInput) {
                filtered = filtered.filter(r => r.student_input?.toLowerCase().includes(searchInput));
            }

            // 3. Standard meanings Search
            if (searchStandard) {
                filtered = filtered.filter(r => {
                    if (Array.isArray(r.standard_meanings)) {
                        return r.standard_meanings.some(m => m.toLowerCase().includes(searchStandard));
                    }
                    return r.standard_meanings?.toLowerCase().includes(searchStandard);
                });
            }

            if (filtered.length === 0) {
                container.innerHTML = `
                    <tr>
                        <td colspan="5" class="py-12 text-center text-slate-500">
                            未找到符合条件的日志记录
                        </td>
                    </tr>
                `;
                return;
            }

            container.innerHTML = filtered.map(r => {
                const dateStr = new Date(r.created_at || Date.now()).toLocaleString('zh-CN', {
                    hour12: false,
                    month: '2-digit',
                    day: '2-digit',
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit'
                });

                const stdList = Array.isArray(r.standard_meanings) 
                    ? r.standard_meanings.join(' / ') 
                    : r.standard_meanings;

                const scorePercent = Math.round(r.similarity * 100);

                const correctBadge = r.is_correct === 1 
                    ? `<span class="inline-flex items-center gap-1 px-2.5 py-1 bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 rounded-full text-xs font-semibold">
                         <span class="w-1.5 h-1.5 rounded-full bg-emerald-400"></span> 正确
                       </span>`
                    : `<span class="inline-flex items-center gap-1 px-2.5 py-1 bg-rose-500/10 text-rose-400 border border-rose-500/20 rounded-full text-xs font-semibold">
                         <span class="w-1.5 h-1.5 rounded-full bg-rose-400"></span> 错误
                       </span>`;

                const similarityBadge = r.is_correct === 1 
                    ? `<span class="text-[10px] font-black text-indigo-400 bg-indigo-500/10 border border-indigo-500/20 px-2 py-0.5 rounded-md mt-1 inline-block">${scorePercent}% 相似度</span>`
                    : `<span class="text-[10px] font-black text-slate-400 bg-slate-800 border border-slate-700/50 px-2 py-0.5 rounded-md mt-1 inline-block">${scorePercent}% 相似度</span>`;

                return `
                    <tr class="hover:bg-slate-800/20 transition-colors">
                        <td class="py-4 px-6 font-mono text-xs text-slate-500">
                            <span class="text-indigo-400 font-bold block">#${r.id}</span>
                            <span class="mt-1 block">${dateStr}</span>
                        </td>
                        <td class="py-4 px-6">
                            <div class="space-y-1">
                                <p class="text-slate-200 font-medium">学生回答: <span class="bg-indigo-950/40 text-indigo-300 px-1.5 py-0.5 rounded">${escapeHtml(r.student_input)}</span></p>
                                <p class="text-xs text-slate-400">标准答案: <span class="bg-slate-900/60 text-slate-300 px-1.5 py-0.5 rounded">${escapeHtml(stdList)}</span></p>
                            </div>
                        </td>
                        <td class="py-4 px-6">
                            <div>
                                ${correctBadge}
                                <br>
                                ${similarityBadge}
                            </div>
                        </td>
                        <td class="py-4 px-6">
                            <div class="space-y-1 max-w-sm">
                                <span class="text-[10px] font-black text-purple-400 uppercase tracking-wider bg-purple-500/10 px-2 py-0.5 rounded-md border border-purple-500/10">${escapeHtml(r.category || '未分类')}</span>
                                <p class="text-xs text-slate-400 mt-1.5 leading-relaxed">${escapeHtml(r.reason || '无解析信息')}</p>
                            </div>
                        </td>
                        <td class="py-4 px-6 text-center">
                            <button onclick="deleteRecord(${r.id})" class="p-2 bg-slate-800 hover:bg-rose-950/30 text-slate-400 hover:text-rose-400 rounded-xl transition-all border border-slate-700/40 hover:border-rose-900/50" title="删除记录">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
                                </svg>
                            </button>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        async function deleteRecord(id) {
            if (!confirm(`确认要删除此条记录(ID: #${id})吗？`)) return;

            try {
                const res = await fetch(`/records/${id}`, { method: 'DELETE' });
                if (!res.ok) throw new Error('删除失败');
                
                showToast(`记录 #${id} 已成功删除`);
                fetchRecords();
            } catch (err) {
                console.error(err);
                showToast(err.message, true);
            }
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        // Initialize Page
        fetchRecords();
    </script>
</body>
</html>
