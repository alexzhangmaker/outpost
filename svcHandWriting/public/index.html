<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Handwriting Tasks</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="manifest" href="manifest.json">
    <style>
        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 pb-20">

    <!-- Header -->
    <header class="bg-indigo-600 text-white p-4 shadow-md sticky top-0 z-50">
        <h1 class="text-xl font-bold text-center" id="header-title">My Handwriting Tasks</h1>
        <button id="back-btn" class="absolute left-4 top-4 hidden text-white" onclick="showView('list')">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
        </button>
    </header>

    <main class="p-4 max-w-md mx-auto">
        <!-- View: Task List -->
        <div id="view-list" class="fade-in space-y-4">
            <div id="task-list" class="flex flex-col space-y-3">
                <div class="text-center text-slate-400 mt-10">Loading tasks...</div>
            </div>
        </div>

        <!-- View: Task Detail & Upload -->
        <div id="view-detail" class="fade-in hidden">
            <div class="glass-card p-4 rounded-xl mb-6">
                <h2 id="detail-title" class="text-lg font-bold text-indigo-700 mb-2"></h2>
                <div id="word-list" class="text-sm text-slate-600 mb-4 bg-slate-100 p-3 rounded-lg overflow-y-auto max-h-40"></div>
                
                <div class="border-2 border-dashed border-indigo-300 rounded-xl p-8 text-center bg-indigo-50/50 hover:bg-indigo-50 transition-colors relative cursor-pointer" id="upload-box">
                    <input type="file" id="photo-input" accept="image/*" capture="environment" class="absolute inset-0 opacity-0 z-10 w-full h-full cursor-pointer">
                    <div class="flex flex-col items-center pointer-events-none">
                        <svg class="w-10 h-10 text-indigo-500 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path></svg>
                        <span class="font-semibold text-indigo-700">Take Photo</span>
                        <span class="text-xs text-indigo-500 mt-1">Upload your worksheet</span>
                    </div>
                </div>

                <div id="preview-area" class="hidden mt-4">
                    <img id="image-preview" class="w-full rounded-lg shadow-sm border border-slate-200">
                    <button id="submit-btn" class="w-full mt-4 bg-indigo-600 text-white font-bold py-3 rounded-xl shadow-lg active:scale-95 transition-transform">
                        Grade This Worksheet
                    </button>
                    <button onclick="resetUpload()" class="w-full mt-2 text-slate-500 py-2 text-sm">Cancel</button>
                </div>
            </div>

            <!-- Result Section -->
            <div id="result-area" class="hidden glass-card p-4 rounded-xl border-t-4 border-indigo-500">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="font-bold text-lg">AI Feedback</h3>
                    <span id="score-badge" class="px-3 py-1 bg-indigo-100 text-indigo-700 font-black rounded-full text-lg"></span>
                </div>
                <p id="summary-text" class="text-sm italic text-slate-600 mb-4 bg-slate-100 p-3 rounded-lg"></p>
                <div id="error-list" class="space-y-3"></div>
            </div>
        </div>
    </main>

    <!-- Loading Overlay -->
    <div id="loading" class="fixed inset-0 bg-white/80 backdrop-blur-sm z-[100] flex flex-col justify-center items-center hidden">
        <div class="w-12 h-12 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin"></div>
        <p class="mt-4 font-bold text-indigo-800" id="loading-text">Analyzing handwriting...</p>
    </div>

    <script>
        let currentTaskId = null;
        let selectedFile = null;

        function showView(viewName) {
            document.getElementById('view-list').classList.add('hidden');
            document.getElementById('view-detail').classList.add('hidden');
            document.getElementById('back-btn').classList.add('hidden');
            
            document.getElementById('view-' + viewName).classList.remove('hidden');
            
            if (viewName === 'list') {
                document.getElementById('header-title').textContent = 'My Handwriting Tasks';
                loadTasks();
            } else {
                document.getElementById('back-btn').classList.remove('hidden');
            }
        }

        async function loadTasks() {
            try {
                const res = await fetch('/api/tasks');
                const data = await res.json();
                const container = document.getElementById('task-list');
                container.innerHTML = '';
                
                if(data.tasks.length === 0) {
                    container.innerHTML = '<div class="text-center text-slate-400 mt-10">No tasks available. Create one from the console.</div>';
                    return;
                }

                data.tasks.forEach(task => {
                    const d = new Date(task.created_at).toLocaleDateString();
                    const el = document.createElement('div');
                    el.className = 'glass-card p-4 rounded-xl cursor-pointer active:scale-95 transition-transform flex justify-between items-center';
                    el.onclick = () => openTask(task.id, task.title);
                    el.innerHTML = `
                        <div>
                            <div class="font-bold text-slate-800">${task.title}</div>
                            <div class="text-xs text-slate-500 mt-1">${d}</div>
                        </div>
                        <svg class="w-5 h-5 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                    `;
                    container.appendChild(el);
                });
            } catch(e) {
                console.error(e);
            }
        }

        async function openTask(id, title) {
            currentTaskId = id;
            document.getElementById('header-title').textContent = title;
            document.getElementById('detail-title').textContent = title;
            document.getElementById('result-area').classList.add('hidden');
            resetUpload();
            showView('detail');

            try {
                const res = await fetch('/api/tasks/' + id);
                const data = await res.json();
                const wordList = data.task.words.map((w, i) => `${i+1}. ${w.thai} (${w.definition})`).join('<br>');
                document.getElementById('word-list').innerHTML = wordList;
            } catch(e) {
                console.error(e);
            }
        }

        const photoInput = document.getElementById('photo-input');
        photoInput.onchange = (e) => {
            if (e.target.files && e.target.files[0]) {
                selectedFile = e.target.files[0];
                const reader = new FileReader();
                reader.onload = (re) => {
                    document.getElementById('image-preview').src = re.target.result;
                    document.getElementById('upload-box').classList.add('hidden');
                    document.getElementById('preview-area').classList.remove('hidden');
                };
                reader.readAsDataURL(selectedFile);
            }
        };

        function resetUpload() {
            selectedFile = null;
            photoInput.value = '';
            document.getElementById('upload-box').classList.remove('hidden');
            document.getElementById('preview-area').classList.add('hidden');
        }

        document.getElementById('submit-btn').onclick = async () => {
            if(!selectedFile || !currentTaskId) return;

            const loading = document.getElementById('loading');
            loading.classList.remove('hidden');
            document.getElementById('result-area').classList.add('hidden');

            const formData = new FormData();
            formData.append('image', selectedFile);

            try {
                const res = await fetch('/api/grade/' + currentTaskId, {
                    method: 'POST',
                    body: formData
                });
                
                const data = await res.json();
                if(!data.success) throw new Error(data.error);

                displayResult(data.assessment);
            } catch(e) {
                alert("Grading failed: " + e.message);
            } finally {
                loading.classList.add('hidden');
            }
        };

        function displayResult(assessment) {
            document.getElementById('result-area').classList.remove('hidden');
            document.getElementById('score-badge').textContent = `${assessment.score}/${assessment.total}`;
            document.getElementById('summary-text').textContent = assessment.summary;
            
            const errorList = document.getElementById('error-list');
            errorList.innerHTML = '';
            
            if(assessment.errors && assessment.errors.length > 0) {
                assessment.errors.forEach(err => {
                    errorList.innerHTML += `
                        <div class="bg-red-50 p-3 rounded-lg border border-red-100 flex items-start space-x-2">
                            <div class="mt-1 w-5 h-5 bg-red-500 text-white rounded-full flex items-center justify-center text-[10px] shrink-0">${err.index + 1}</div>
                            <div>
                                <div class="text-sm font-bold text-red-800">${err.mistake}</div>
                                <div class="text-xs text-red-600 mt-1">Expected: ${err.expected} | Actual: ${err.actual}</div>
                            </div>
                        </div>
                    `;
                });
            } else {
                errorList.innerHTML = '<div class="text-center text-emerald-600 font-bold p-2 bg-emerald-50 rounded-lg">Perfect! No errors detected.</div>';
            }
        }

        // Init
        loadTasks();
    </script>
</body>
</html>
