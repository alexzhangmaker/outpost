<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>lifeLearning Platform</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Serif+Thai:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg-gradient: linear-gradient(135deg, #f5f7ff 0%, #e0e7ff 100%);
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.5);
            --text-main: #1e293b;
            --text-muted: #64748b;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        .app-container {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* Header */
        .scene-info {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            padding: 32px;
            border-radius: 24px;
            box-shadow: var(--shadow);
            text-align: center;
        }

        .scene-info h1 {
            font-size: 2.5rem;
            margin-bottom: 8px;
            color: var(--primary);
        }

        .scene-info .meta {
            display: flex;
            justify-content: center;
            gap: 16px;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        /* Navigation Tabs */
        .nav-tabs {
            display: flex;
            background: rgba(255, 255, 255, 0.4);
            padding: 8px;
            border-radius: 40px;
            gap: 8px;
            overflow-x: auto;
            scrollbar-width: none;
            margin-bottom: 8px;
        }

        .mode-tabs {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 16px;
        }

        .tab-item,
        .mode-item {
            padding: 10px 20px;
            border-radius: 32px;
            border: none;
            background: transparent;
            cursor: pointer;
            font-weight: 600;
            white-space: nowrap;
            transition: all 0.3s;
            color: var(--text-muted);
        }

        .tab-item.active,
        .mode-item.active {
            background: white;
            color: var(--primary);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.15);
        }

        .mode-item {
            font-size: 0.85rem;
            padding: 6px 16px;
            background: rgba(255, 255, 255, 0.5);
        }

        /* Activity Container */
        .activity-viewport {
            background: white;
            border-radius: 32px;
            min-height: 500px;
            box-shadow: 0 20px 50px -12px rgba(0, 0, 0, 0.1);
            padding: 40px;
            position: relative;
            overflow: hidden;
            border: 1px solid #f1f5f9;
        }

        /* Activity Specific Styles (Injected via JS) */
        .activity-header h2 {
            font-size: 1.8rem;
            margin-bottom: 4px;
        }

        .activity-header .subtitle {
            color: var(--text-muted);
            margin-bottom: 32px;
            border-bottom: 2px solid #f1f5f9;
            padding-bottom: 16px;
        }

        /* Dialog Activity Styles */
        .chat-display {
            height: 350px;
            overflow-y: auto;
            padding: 20px;
            background: #f8fafc;
            border-radius: 20px;
            margin-bottom: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .chat-message {
            display: flex;
            max-width: 80%;
        }

        .chat-message.waiter {
            align-self: flex-start;
        }

        .chat-message.customer {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message-bubble {
            padding: 12px 20px;
            border-radius: 18px;
            font-family: 'Noto Serif Thai', serif;
            position: relative;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .message-bubble:hover {
            filter: brightness(0.95);
            transform: scale(1.02);
        }

        .customer .message-bubble:hover {
            filter: brightness(1.1);
        }

        .role-name {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 4px;
            opacity: 0.7;
        }

        .waiter .message-bubble {
            background: #e2e8f0;
            border-bottom-left-radius: 4px;
        }

        .customer .message-bubble {
            background: var(--primary);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message-bubble .text-th {
            font-size: 1.1rem;
            margin-bottom: 4px;
        }

        .message-bubble .text-en {
            font-size: 0.85rem;
            opacity: 0.8;
            font-family: 'Inter', sans-serif;
        }

        .interaction-bar {
            background: #fff;
            padding-top: 10px;
        }

        .line-hint {
            font-size: 1rem;
            color: var(--primary);
            font-weight: 600;
            margin-bottom: 12px;
        }

        .input-section {
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        .input-container {
            position: relative;
            flex: 1;
            background: #f1f5f9;
            border-radius: 16px;
            min-height: 80px;
            display: flex;
            flex-direction: column;
            border: 2px solid transparent;
            transition: all 0.2s;
        }

        .input-container:focus-within {
            background: white;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        .interactive-input,
        .ghost-text {
            padding: 16px 24px;
            font-size: 1.5rem;
            line-height: 1.4;
            font-family: 'Noto Serif Thai', serif;
            width: 100%;
            box-sizing: border-box;
            background: transparent;
            word-wrap: break-word;
            white-space: pre-wrap;
        }

        .interactive-input {
            position: relative;
            z-index: 10;
            outline: none;
            min-height: 80px;
        }

        .ghost-text {
            position: absolute;
            top: 0;
            left: 0;
            color: #cbd5e1;
            z-index: 5;
            font-style: italic;
            pointer-events: none;
        }

        .interactive-input:empty:before {
            content: attr(placeholder);
            color: #94a3b8;
            font-family: 'Inter', sans-serif;
            font-size: 1.1rem;
            font-style: normal;
        }

        .action-buttons {
            display: flex;
            gap: 8px;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn-primary:active {
            transform: scale(0.95);
        }

        .btn-icon {
            background: #f1f5f9;
            border: none;
            width: 56px;
            height: 56px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-icon:hover {
            background: #e2e8f0;
        }

        /* Animations */
        .fade-in {
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Skeleton styling */
        .skeleton-placeholder {
            padding: 40px;
            border: 2px dashed #e2e8f0;
            border-radius: 20px;
            text-align: center;
            color: var(--text-muted);
        }

        .vocab-list {
            margin-top: 20px;
            text-align: left;
            list-style: none;
        }

        .vocab-list li {
            padding: 8px 0;
            border-bottom: 1px solid #f1f5f9;
            display: flex;
            justify-content: space-between;
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: #1e293b;
            color: white;
            padding: 16px 24px;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.2);
            z-index: 1000;
            display: none;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from {
                transform: translateY(100px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* Scoring and Role Play UI */
        .scoring-container {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 16px;
        }

        .btn-score {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 2px solid var(--primary);
            background: white;
            color: var(--primary);
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-score:hover {
            background: var(--primary);
            color: white;
            transform: scale(1.1);
        }

        .user-target {
            border: 2px dashed var(--primary);
            background: rgba(99, 102, 241, 0.05) !important;
        }
    </style>
</head>

<body>

    <div class="app-container">
        <div class="scene-info" id="sceneInfo">
            <h1>加载中...</h1>
        </div>

        <div class="nav-tabs" id="navTabs">
            <!-- Tabs injected here -->
        </div>

        <div class="mode-tabs" id="modeTabs" style="display:none;">
            <button class="mode-item active" onclick="switchMode('standard')">标准播放</button>
            <button class="mode-item" onclick="switchMode('roleplay')">角色扮演</button>
        </div>

        <div class="activity-viewport" id="activityViewport">
            <!-- Activity content injected here -->
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script src="learningActivity.js?v=20260510"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const API_BASE = 'http://localhost:7001/api';
            const USER_ID = 'user_001';

            let sceneData = null;
            let currentPart = null;
            let currentMode = 'standard';

            // 1. Load Pending Activity
            try {
                const pendingResp = await fetch(`${API_BASE}/activities/pending?userId=${USER_ID}`);
                if (pendingResp.ok) {
                    const pendingActivities = await pendingResp.json();

                    if (pendingActivities.length > 0) {
                        // For demo, we'll take the first scheduled activity
                        const scheduled = pendingActivities[0];
                        const artifactResp = await fetch(`${API_BASE}/admin/artifacts`);
                        const artifacts = await artifactResp.json();
                        const artifactRaw = artifacts.find(a => a.id === scheduled.artifactId);

                        sceneData = artifactRaw ? artifactRaw.data : { title: scheduled.artifactId, difficulty: 'N/A', estimatedTime: 'N/A' };
                        sceneData.id = scheduled.artifactId; // Ensure ID is present for checkin

                        currentPart = scheduled.part;
                        currentPart.classifier = sceneData.classifier || 'thai';
                    } else {
                        // Fallback to local scene.json if no pending
                        const response = await fetch('scene.json');
                        sceneData = await response.json();
                        currentPart = sceneData.parts[0];
                        currentPart.classifier = sceneData.classifier || 'thai';
                    }
                } else {
                    throw new Error("Backend API not reachable");
                }
            } catch (err) {
                console.error("Failed to load from backend, falling back to local scene.json", err);
                const response = await fetch('scene.json');
                sceneData = await response.json();
                currentPart = sceneData.parts[0];
            }

            const sceneInfoEl = document.getElementById('sceneInfo');
            const navTabsEl = document.getElementById('navTabs');
            const modeTabsEl = document.getElementById('modeTabs');
            const viewportEl = document.getElementById('activityViewport');

            // 2. Render Header (Artifact Context)
            sceneInfoEl.innerHTML = `
            <h1>${sceneData.title}</h1>
            <div class="meta">
                <span>📚 当前任务: ${currentPart.title || currentPart.partType || 'Activity'}</span>
                <span>📊 ${sceneData.difficulty || 'N/A'}</span>
            </div>
        `;

            // 3. Hide Navigation Tabs (Focus on single pending activity)
            navTabsEl.style.display = 'none';

            // 4. Render Activity
            function updateActivity() {
                let activity;

                if (currentPart.partType === 'standardDialog') {
                    modeTabsEl.style.display = 'flex';
                    activity = currentMode === 'roleplay'
                        ? new RolePlayDialogActivity(currentPart)
                        : new StandardDialogActivity(currentPart);
                    ActivityFactory.activeActivity = activity;
                } else {
                    modeTabsEl.style.display = 'none';
                    currentMode = 'standard';
                    activity = ActivityFactory.create(currentPart);
                }

                activity.render(viewportEl);
            }

            window.switchMode = (mode) => {
                currentMode = mode;
                document.querySelectorAll('.mode-item').forEach(btn => {
                    btn.classList.toggle('active', (mode === 'standard' && btn.innerText.includes('标准')) || (mode === 'roleplay' && btn.innerText.includes('角色')));
                });
                updateActivity();
            };

            // Initial render
            updateActivity();

            // 5. Listen for Check-ins
            window.addEventListener('learningActivityCheckIn', async (e) => {
                const record = e.detail;

                // Add context for the backend
                const fullRecord = {
                    ...record,
                    userId: USER_ID,
                    artifactId: sceneData.id,
                    status: 'completed'
                };

                // Post to backend
                try {
                    const resp = await fetch(`${API_BASE}/activities/checkin`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(fullRecord)
                    });
                    const result = await resp.json();
                    console.log("Check-in saved to backend:", result);
                } catch (err) {
                    console.error("Failed to save check-in to backend", err);
                }

                const toast = document.getElementById('toast');
                toast.innerHTML = `
                <div style="font-weight:700; margin-bottom:4px;">✅ 学习打卡成功！</div>
                <div style="font-size:0.85rem; opacity:0.8;">
                    Part: ${record.partId}<br>
                    Score: ${record.score}<br>
                    Duration: ${record.durationSeconds}s
                </div>
            `;
                toast.style.display = 'block';

                setTimeout(() => {
                    toast.style.display = 'none';
                }, 5000);
            });
        });
    </script>

</body>

</html>
